<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

window.location.href = 'exam.html?start=6';

<p>Redirecting to Examination 6... <a href="exam.html">Click here if not redirected.</a></p>
<script src="assets/gate_shared.js"></script>

<script>
/* Admin access via URL: add ?admin=GATE2025admin to any page URL */
(function(){
  var params = new URLSearchParams(window.location.search);
  var key = params.get('admin');
  if(key === 'GATE2025admin'){
    /* Set session flag */
    try{ sessionStorage.setItem('gate_admin_url','1'); }catch(e){}
    /* Trigger existing admin unlock functions if they exist */
    var fns=['promptAdmin','promptAdminStore','promptAdminHire','promptAdminChurch',
             'promptAdminRel','promptAdminTv','promptAdminRadio','promptAdminArt',
             'promptAdminProfile','promptAdminHire'];
    window.addEventListener('load', function(){
      /* Mark admin as active without showing prompt */
      if(typeof isAdmin !== 'undefined') isAdmin = true;
      if(typeof isAdminH !== 'undefined') isAdminH = true;
      if(typeof isAdminStore !== 'undefined') isAdminStore = true;
      if(typeof isAdminC !== 'undefined') isAdminC = true;
      if(typeof isAdminRel !== 'undefined') isAdminRel = true;
      if(typeof isAdminTv !== 'undefined') isAdminTv = true;
      if(typeof isAdminRadio !== 'undefined') isAdminRadio = true;
      if(typeof isAdminArt !== 'undefined') isAdminArt = true;
      /* Show all admin panels */
      document.querySelectorAll('.admin-box,.admin-panel,[id*="admin"],[id*="Admin"]').forEach(function(el){
        if(el.id && (el.id.toLowerCase().includes('box') || el.id.toLowerCase().includes('panel'))){
          el.classList.add('visible');
          el.style.display='block';
        }
      });
      /* Rebuild any admin-aware UI */
      if(typeof buildTabs==='function') buildTabs();
      if(typeof renderApplications==='function') renderApplications();
      if(typeof renderStatusAdmin==='function') renderStatusAdmin();
      if(typeof updateAppCount==='function') updateAppCount();
      console.log('[GATE] Admin mode active via URL');
    });
  }
  /* Also check sessionStorage for persistence across page loads */
  try{
    if(sessionStorage.getItem('gate_admin_url')==='1'){
      window.addEventListener('load', function(){
        if(typeof isAdmin !== 'undefined') isAdmin = true;
        if(typeof isAdminH !== 'undefined') isAdminH = true;
        if(typeof isAdminStore !== 'undefined') isAdminStore = true;
        document.querySelectorAll('.admin-box,.admin-panel').forEach(function(el){
          el.classList.add('visible');
        });
        if(typeof buildTabs==='function') buildTabs();
      });
    }
  }catch(e){}
})();
</script>

</body></html>
